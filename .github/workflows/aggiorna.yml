name: Aggiorna Sarkietta ogni mattina

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  genera-e-carica:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Genera contenuti AI con DeepSeek
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node genera.js

      - name: Carica su FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./public/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          protocol: ftp
          port: 21
          security: loose
          exclude: |
            **/.git*
            **/.git*/**
