name: Aggiorna Sarkietta ogni mattina

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  genera-e-carica:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Genera contenuti AI con DeepSeek
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node genera.js

      - name: Installa lftp e carica su FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          sudo apt-get install -y lftp
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_HOST" << EOF
          set ftp:passive-mode true
          set ftp:use-ipv6 false
          set ssl:verify-certificate false
          set net:timeout 30
          mirror -R ./public/ $FTP_REMOTE_DIR
          bye
          EOF
